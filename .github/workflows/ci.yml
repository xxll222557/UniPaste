name: Cross-Platform CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build Check ${{ matrix.platform_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform_name: macOS
            bundles: dmg
          - os: windows-latest
            platform_name: Windows
            bundles: nsis

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npx tauri build --bundles ${{ matrix.bundles }}
